name: Build desktop app

# Builds the PyInstaller-packaged desktop app (see desktop.py / GrantTracker.spec)
# for macOS and Windows. Manual runs (workflow_dispatch) just produce downloadable
# build artifacts for testing; pushing a `v*` tag additionally attaches both to a
# GitHub Release. Nothing here touches user data -- these are clean, empty builds;
# each user's grant data stays entirely on their own machine (see CLAUDE.md).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt

      - name: Build with PyInstaller
        run: pyinstaller GrantTracker.spec --noconfirm

      - name: Zip the .app bundle
        # ditto (not plain zip) preserves the .app bundle structure/permissions
        # correctly on macOS.
        run: ditto -c -k --sequesterRsrc --keepParent dist/GrantTracker.app GrantTracker-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: GrantTracker-macOS
          path: GrantTracker-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt

      - name: Build with PyInstaller
        run: pyinstaller GrantTracker.spec --noconfirm

      - name: Zip the app folder
        run: Compress-Archive -Path dist/GrantTracker -DestinationPath GrantTracker-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: GrantTracker-Windows
          path: GrantTracker-Windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release with both builds attached
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GrantTracker-macOS/GrantTracker-macOS.zip
            artifacts/GrantTracker-Windows/GrantTracker-Windows.zip
